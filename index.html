<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
    <script>
        window.OneSignal = window.OneSignal || [];
        OneSignal.push(function() {
            OneSignal.init({
                appId: "f412bf77-9c0e-4c0e-9aca-4deb21dcbd20",
            });
        });
    </script>
</head>
<body>
    <header>
        <h1>📰 Noticias App</h1>
        <p>Recibe notificaciones de las últimas noticias</p>
        <button id="btn-notificaciones" onclick="suscribirNotificaciones()">
            🔔 Activar Notificaciones
        </button>
    </header>
    
    <main id="noticias-container">
        <p class="cargando">Cargando noticias...</p>
    </main>
    
    <footer>
        <p>© 2026 Noticias JPII - Proyecto Educativo</p>
    </footer>

    <!-- Script de noticias -->
    <script>
        // URL de tu Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbw1I6ajLn7Yk1MeCiRXVf8wY4tzrijKJN9XrLSX8JnvHf-DclBbpJnB-4Di3fcsMo4V9Q/exec';
        
        // Cargar noticias al iniciar
        async function cargarNoticias() {
            try {
                const response = await fetch(API_URL);
                const noticias = await response.json();
                
                const container = document.getElementById('noticias-container');
                container.innerHTML = '';
                
                // Mostrar noticias más recientes primero
                noticias.reverse().forEach(noticia => {
                    const div = document.createElement('div');
                    div.className = 'noticia';
                    div.innerHTML = `
                        ${noticia.imagen ? `<img src="${noticia.imagen}" alt="${noticia.titulo}" class="noticia-img">` : ''}
                        <h2>${noticia.titulo}</h2>
                        <p>${noticia.contenido}</p>
                        <small>📅 ${noticia.fecha}</small>
                    `;
                    container.appendChild(div);
                });
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('noticias-container').innerHTML = 
                    '<p class="error">Error al cargar noticias. Intenta recargar.</p>';
            }
        }
        
        // Suscribirse a notificaciones
        function suscribirNotificaciones() {
            OneSignal.push(function() {
                OneSignal.showNativePrompt();
            });
        }
        
        // Cargar noticias al abrir la página
        cargarNoticias();
        
        // Recargar cada 5 minutos para ver nuevas noticias
        setInterval(cargarNoticias, 300000);
    </script>

    <!-- ✅ AQUÍ VA EL SERVICE WORKER (al final, antes de cerrar body) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(function(registration) {
                    console.log('Service Worker registrado:', registration);
                })
                .catch(function(error) {
                    console.log('Error al registrar Service Worker:', error);
                });
        }
    </script>
</body>
</html>
