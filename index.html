<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <!-- ✅ CÓDIGO OFICIAL ONESIGNAL -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "f412bf77-9c0e-4c0e-9aca-4deb21dcbd20",
                safari_web_id: "web.onesignal.auto.6514249a-4cb8-451b-a889-88f5913c9a7f",
                notifyButton: {
                    enable: true,
                },
            });
        });
    </script>
</head>
<body>
    <header>
        <h1>📰 Noticias App</h1>
        <p>Recibe notificaciones de las últimas noticias</p>
    </header>
    
    <main id="noticias-container">
        <p class="cargando">Cargando noticias...</p>
    </main>
    
    <footer>
        <p>© 2026 Noticias JPII - Proyecto Educativo</p>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw1I6ajLn7Yk1MeCiRXVf8wY4tzrijKJN9XrLSX8JnvHf-DclBbpJnB-4Di3fcsMo4V9Q/exec';
        
        async function cargarNoticias() {
            try {
                const response = await fetch(API_URL);
                const noticias = await response.json();
                
                const container = document.getElementById('noticias-container');
                container.innerHTML = '';
                
                noticias.reverse().forEach(noticia => {
                    const div = document.createElement('div');
                    div.className = 'noticia';
                    div.innerHTML = `
                        ${noticia.imagen ? `<img src="${noticia.imagen}" alt="${noticia.titulo}" class="noticia-img">` : ''}
                        <h2>${noticia.titulo}</h2>
                        <p>${noticia.contenido}</p>
                        <small>📅 ${noticia.fecha}</small>
                    `;
                    container.appendChild(div);
                });
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('noticias-container').innerHTML = 
                    '<p class="error">Error al cargar noticias. Intenta recargar.</p>';
            }
        }
        
        cargarNoticias();
        setInterval(cargarNoticias, 300000);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Noticias-EDU/sw.js');
        }
    </script>
</body>
</html>
